services:
  mysql:
    image: mysql:8.0
    container_name: babi_mysql_prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data_prod:/var/lib/mysql
    networks:
      - babi_network_prod
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "${DB_USERNAME}",
          "-p${DB_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    # Pas de port expose publiquement : seul "back" doit atteindre MySQL, via le reseau interne.

  back:
    build:
      context: ./babi-backend # <-- adapte si ton dossier s'appelle vraiment "babi"
      dockerfile: Dockerfile.prod
    container_name: babi_back_prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./babi-backend/.env.production # <-- fichier dedie a la prod, PAS le .env de dev (mailpit)
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - babi_network_prod

  front:
    build:
      context: ./front/Babi-frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: babi_front_prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - back
    networks:
      - babi_network_prod

networks:
  babi_network_prod:
    driver: bridge

volumes:
  mysql_data_prod:
    name: babiservice2_mysql_data_prod
